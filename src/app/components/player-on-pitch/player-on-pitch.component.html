<div class="player-on-pitch">
    <div class="photo-wrapper">
      @if (matchPlayer.player.photo_url) {
        <img [src]="matchPlayer.player.photo_url" alt="{{ matchPlayer.player.display_name }}" class="player-photo"/>
      } @else {
        <img class="player-photo generic-player" src="assets/genericPlayer.png" [alt]="matchPlayer.player.display_name"/>
      }
    </div>
    <div class="name">{{ matchPlayer.player.display_name }}</div>
</div>

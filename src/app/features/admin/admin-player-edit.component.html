<section class="page-shell">
  <header class="page-header">
    <div>
      <h1>Modifier le joueur</h1>
      <p>Modifier les informations du joueur.</p>
    </div>
    <a routerLink="/admin/players" class="button secondary">Retour à la liste</a>
  </header>

  <article class="panel">
    <p class="meta">ID du joueur : {{ id || 'inconnu' }}</p>

    <form class="form-grid">
      <label>
        Nom
        <input type="text" placeholder="Nom" />
      </label>
      <label>
        Numéro
        <input type="number" min="1" placeholder="Numéro" />
      </label>
      <label>
        Poste
        <input type="text" placeholder="Poste" />
      </label>
      <label>
        Nationalité
        <input type="text" placeholder="Nationalité" />
      </label>
      <label>
        Photo URL
        <input type="text" placeholder="URL de la photo" />
      </label>
      <div class="form-actions">
        <button type="button" class="button">Sauvegarder</button>
      </div>
    </form>
  </article>
</section>

      <h1>Détail du match</h1>
      <p>Vue centrale du match avec infos, lineup, score et votes.</p>
    </div>
    <a routerLink="/admin/matches" class="button secondary">Retour aux matchs</a>

  <article class="panel">

      <li>Score</li>

    </ul>
  </article>
</section>

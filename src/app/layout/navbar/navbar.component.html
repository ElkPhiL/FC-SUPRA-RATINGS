<nav class="navbar">
  <div class="navbar-top">
    <div class="logo">FC SUPRA</div>

    <button class="menu-btn" (click)="menuOpen = !menuOpen">
      ☰
    </button>

    <div class="desktop-links">
      <a class="nav-btn" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
      <a class="nav-btn" routerLink="/matches" routerLinkActive="active">Matches</a>
      <a class="nav-btn" routerLink="/players" routerLinkActive="active">Players</a>
      <a class="nav-btn" routerLink="/standings" routerLinkActive="active">Standings</a>
      <a class="nav-btn" routerLink="/admin" routerLinkActive="active">Admin</a>

      @if (!user()) {
        <a class="nav-btn" routerLink="/login" routerLinkActive="active">Login</a>
        <a class="nav-btn" routerLink="/register" routerLinkActive="active">Register</a>
      }

      @if (user()) {
        <a class="nav-btn" routerLink="/profile" routerLinkActive="active" class="profile-link">
          <div class="avatar-circle">
            @if (supabaseService.getAvatarUrl()) {
              <img [src]="supabaseService.getAvatarUrl()" alt="Avatar" />
            } @else {
              <span class="avatar-letter">{{ avatarDisplay() }}</span>
            }
          </div>
        </a>
      }
    </div>
  </div>

  @if (menuOpen) {
    <div class="mobile-menu">
      <a routerLink="/" (click)="menuOpen=false">Home</a>
      <a routerLink="/matches" (click)="menuOpen=false">Matches</a>
      <a routerLink="/players" (click)="menuOpen=false">Players</a>
      <a routerLink="/standings" (click)="menuOpen=false">Standings</a>
      <a routerLink="/admin" (click)="menuOpen=false">Admin</a>

      @if (!user()) {
        <a routerLink="/login" (click)="menuOpen=false">Login</a>
        <a routerLink="/register" (click)="menuOpen=false">Register</a>
      }

      @if (user()) {
        <a routerLink="/profile" (click)="menuOpen=false" class="profile-link">Mon profil</a>
      }
    </div>
  }
</nav>

<section class="dashboard-page">
  <header class="dashboard-header">
    <h1>Tableau de bord admin</h1>
    <p>Vue synthétique des joueurs, des matchs et des actions rapides.</p>
  </header>

  <div class="dashboard-grid">
    <article class="card summary-card">
      <h2>Total joueurs</h2>
      <p class="value">--</p>
    </article>

    <article class="card summary-card">
      <h2>Matchs à venir</h2>
      <p class="value">--</p>
    </article>

    <article class="card summary-card">
      <h2>Votes ouverts</h2>
      <p class="value">--</p>
    </article>

    <article class="card action-card">
      <h2>Actions rapides</h2>
      <div class="actions">
        <a routerLink="/admin/players" class="button">Gérer les joueurs</a>
        <a routerLink="/admin/matches" class="button secondary">Gérer les matchs</a>
      </div>
    </article>
  </div>

  <section class="dashboard-panel">
    <h2>Joueurs récents</h2>
    <p class="placeholder">Liste de roster à venir...</p>
  </section>
</section>

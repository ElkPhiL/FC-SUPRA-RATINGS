<div class="lineup-container">
  
  @if (message()) {
    <div class="status-message" [class.loading]="loading()">
      {{ message() }}
    </div>
  }

  <header class="tactics-header">
    <div class="formation-picker">
      <label for="formation">Dispositif Tactique :</label>
      <select id="formation" name="formation" (change)="changeFormation($event)">
        <option *ngFor="let f of formations" [value]="f.name" [selected]="f.name === selectedFormation().name">
          {{ f.name }}
        </option>
      </select>
    </div>
    <button class="btn btn-secondary" (click)="resetLineup()">Effacer la composition</button>
  </header>

  <div class="workspace">
    
    <main class="pitch-section">
      <div class="pitch-wrapper">
        <app-lineup-pitch
          [formation]="selectedFormation()"
          [lineup]="lineup()"
          [editable]="true"
          (removePlayer)="deleteFromSlot($event)"
          (slotClick)="openSearch($event)"
        ></app-lineup-pitch>
      </div>
    </main>

    <aside class="bench-section">
      <h3>Remplaçants</h3>
      <div class="bench-grid">
        @for (slot of benchFormation().slots; track slot.key) {
          <div class="bench-slot-card">
            @if (lineup()[slot.key]; as currentPlayer) {
              <div class="filled-bench-slot">
                <app-player-on-pitch
                  [matchPlayer]="currentPlayer"
                  (remove)="deleteFromSlot(slot.key)">
                </app-player-on-pitch>
              </div>
            } @else {
              <button class="empty-bench-slot" (click)="openSearch(slot)">
                <span class="plus-icon">+</span>
              </button>
            }
          </div>
        }
      </div>
    </aside>

  </div>

  <div class="actions-bar">
    <button class="submit-btn" [disabled]="loading()" (click)="saveLineup()">
      Enregistrer la composition
    </button>
  </div>
</div>

<app-player-search
  [visible]="searchOpen()"
  [players]="availablePlayers()"
  [slotLabel]="selectedSlot()?.label || ''"
  (close)="searchOpen.set(false)"
  (selectPlayer)="assignPlayerFromSearch($event)">
</app-player-search>

<section class="page-shell">
  <header class="page-header">
    <div>
      <h1>Players</h1>
      <p>Roster, recherche et gestion des joueurs.</p>
    </div>
    <a routerLink="/admin/players/new" class="button">Nouveau joueur</a>
  </header>

  <article class="panel">
    <h2>Liste des joueurs</h2>

    <app-search-bar></app-search-bar>

    <div class="status-row">
      <p class="status-message" *ngIf="loading()">Chargement des joueurs…</p>
      <p class="status-message" *ngIf="!loading() && message()">{{ message() }}</p>
    </div>

    <ul class="player-table">
      @for (player of players(); track player.id) {
        <li>
          <app-player-card
            [player]="player"
            [showActions]="true"
            (delete)="deletePlayer($event)">
          </app-player-card>
        </li>
      }
    </ul>
  </article>
</section>

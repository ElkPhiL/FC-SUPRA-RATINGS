<div class="page players-page">
  <header class="players-header">
    <div>
      <h1>Joueurs actifs</h1>
    </div>
    @if (loading()) {
      <div class="loader">Chargement des joueurs…</div>
    }
  </header>

  @if (message() && !loading()) {
    <div class="message">{{ message() }}</div>
  }

  @if (!loading() && players().length) {
    <section class="players-grid">
      @for (player of players(); track player.id) {
        <app-player-card [player]="player"></app-player-card>
      }
    </section>
  }
</div>
